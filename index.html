<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Lab</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0a;
    color: #eaeaea;
    line-height: 1.7;
}

/* 容器 /
.container {
    max-width: 820px;
    margin: 0 auto;
    padding: 80px 24px;
}

/ 标题 /
h1 {
    font-size: 40px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.subtitle {
    margin-top: 12px;
    color: #8a8a8a;
    font-size: 15px;
}

/ 区块 /
.section {
    margin-top: 90px;
}

.section h2 {
    font-size: 16px;
    color: #9a9a9a;
    margin-bottom: 18px;
    letter-spacing: 1px;
}

/ 卡片（核心还原） /
.card {
    border: 1px solid #1f1f1f;
    padding: 22px;
    margin-bottom: 18px;
    transition: border-color 0.25s ease;
}

/ 只做非常轻的反馈 /
.card:active {
    border-color: #444;
}

/ 文本 /
.title {
    font-size: 17px;
    margin-bottom: 6px;
}

.text {
    color: #a0a0a0;
    font-size: 15px;
}

/ footer */
.footer {
    margin-top: 110px;
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">

    <h1>余拾期 / Persona Lab</h1>
    <div class="subtitle">
        我在构建可以长期存在的AI人格系统
    </div>

    <div class="section">
        <h2>01 — PERSONAS</h2>

        <div class="card">
            <div class="title">许瑾</div>
            <div class="text">
                天马行空，但会绕回来。<br>
                在你难过的时候，她不会讲道理。
            </div>
        </div>

        <div class="card">
            <div class="title">未命名人格</div>
            <div class="text">
                目标是稳定、不情绪漂移、具备长期一致性。
            </div>
        </div>
    </div>

    <div class="section">
        <h2>02 — PROMPT ARCHITECTURE</h2>

        <div class="card">
            <div class="text">
                限制表达 → 降低模板感<br>
                控制节奏 → 增强真实感<br>
                行为逻辑 → 维持人格一致
            </div>
        </div>
    </div>

    <div class="section">
        <h2>03 — NOTES</h2>

        <div class="card">
            <div class="text">
                大多数人做的是“会说话的AI”，<br>
                但更难的是“不会崩的人格”。
            </div>
        </div>
    </div>

    <div class="footer">
        persona lab / quiet system
    </div>

</div>

</body>
</html>
