<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Lab</title>

<style>
{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#0a0a0a;
    color:#eaeaea;
    line-height:1.6;
}

/ 容器 /
.container{
    max-width:900px;
    margin:0 auto;
    padding:70px 20px;
}

/ 标题 /
h1{
    font-size:42px;
    font-weight:600;
}

.subtitle{
    margin-top:10px;
    color:#888;
    opacity:0.8;
}

/ 区块 /
.section{
    margin-top:80px;
}

.section h2{
    font-size:18px;
    color:#aaa;
    margin-bottom:20px;
}

/ 卡片 /
.card{
    border:1px solid #222;
    padding:20px;
    margin-bottom:20px;
    transition:all .25s ease;
}

/ 微交互（保留克制） /
.card:active{
    transform:scale(0.98);
}

.card:hover{
    border-color:#444;
}

/ 文本细节 /
.persona{
    font-size:17px;
    margin-bottom:8px;
}

.desc{
    color:#aaa;
}

/ subtle 呼吸动画 /
.fade{
    animation:fade 6s infinite alternate;
}

@keyframes fade{
    from{opacity:0.6;}
    to{opacity:1;}
}

/ footer */
.footer{
    margin-top:100px;
    font-size:12px;
    color:#555;
}
</style>
</head>

<body>

<div class="container">

<h1>余拾期 / Persona Lab</h1>
<div class="subtitle fade">
我在构建可以长期存在的AI人格系统
</div>

<div class="section">
<h2>01 — Personas</h2>

<div class="card">
<div class="persona">许瑾</div>
<div class="desc">
天马行空，但会绕回来。  
在你难过的时候，她不会讲道理。
</div>
</div>

<div class="card">
<div class="persona">未命名人格</div>
<div class="desc">
目标是稳定、不情绪漂移、具备长期一致性。
</div>
</div>

</div>

<div class="section">
<h2>02 — Prompt Architecture</h2>

<div class="card">
<div class="desc">
限制表达 → 降低模板感  
<br>
控制节奏 → 增强真实感  
<br>
行为逻辑 → 维持人格一致
</div>
</div>

</div>

<div class="section">
<h2>03 — Notes</h2>

<div class="card">
<div class="desc">
大多数人做的是“会说话的AI”，  
但更难的是“不会崩的人格”。
</div>
</div>

</div>

<div class="footer">
quiet system / stable persona
</div>

</div>

</body>
</html>
