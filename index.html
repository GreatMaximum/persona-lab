<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Lab</title>

<style>
{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#0a0a0a;
    color:#eaeaea;
}

/ 容器 /
.container{
    max-width:900px;
    margin:0 auto;
    padding:80px 20px;
}

/ 标题 /
h1{
    font-size:40px;
    font-weight:600;
}

.subtitle{
    margin-top:10px;
    color:#888;
    transition:opacity .4s;
}

/ 区块 /
.section{
    margin-top:70px;
}

.section h2{
    font-size:16px;
    color:#aaa;
    margin-bottom:15px;
}

/ 卡片 /
.card{
    border:1px solid #222;
    padding:18px;
    margin-bottom:15px;
    transition:all .25s ease;
    cursor:pointer;
}

.card:active{
    transform:scale(0.98);
}

.card.open{
    border-color:#666;
}

/ 展开内容 /
.extra{
    margin-top:12px;
    color:#aaa;
    display:none;
}

.card.open .extra{
    display:block;
}

/ footer /
.footer{
    margin-top:80px;
    color:#555;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>余拾期 / Persona Lab</h1>
<div class="subtitle" id="subtitle">
我在构建可以长期存在的AI人格系统
</div>

<div class="section">
<h2>01 — Personas</h2>

<div class="card">
<div>许瑾</div>
<div class="extra">
她不会安慰你，但会让你意识到你在逃避什么。
</div>
</div>

<div class="card">
<div>未命名人格</div>
<div class="extra">
目标：稳定、不情绪漂移、具备长期一致性。
</div>
</div>

</div>

<div class="section">
<h2>02 — Architecture</h2>

<div class="card">
<div>Prompt System</div>
<div class="extra">
限制表达 → 控制节奏 → 行为逻辑 → 记忆约束
</div>
</div>

</div>

<div class="section">
<h2>03 — Notes</h2>

<div class="card">
<div>Observation</div>
<div class="extra">
难点不是“会说”，而是“始终是同一个人”。
</div>
</div>

</div>

<div class="footer">
system quietly running...
</div>

</div>

<script>
/ 卡片展开（确保执行） /
document.querySelectorAll('.card').forEach(function(card){
    card.addEventListener('click', function(){
        card.classList.toggle('open');
    });
});

/ 标题轮换（稳定写法） */
var texts=[
"我在构建可以长期存在的AI人格系统",
"一致性，比聪明更重要",
"限制，是人格的边界",
"不是对话，而是结构"
];

var i=0;
setInterval(function(){
    i=(i+1)%texts.length;
    var el=document.getElementById('subtitle');
    el.style.opacity=0;
    setTimeout(function(){
        el.innerText=texts[i];
        el.style.opacity=1;
    },200);
},4000);
</script>

</body>
</html>
